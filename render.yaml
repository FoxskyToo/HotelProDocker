services:
  - type: web
    name: hotelpro-api
    runtime: docker
    rootDir: hotelpro
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true

    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

  - type: web
    name: hotelpro-gateway
    runtime: docker
    rootDir: hotelpro-gateway
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true

    envVars:
      - key: HOTELPRO_API_URL
        sync: false