services:
  # API principal HotelPro
  - type: web
    name: hotelpro-api
    runtime: docker
    plan: free
    rootDir: hotelpro
    dockerfilePath: ./Dockerfile
    autoDeploy: true

    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false

      - key: SPRING_DATASOURCE_USERNAME
        sync: false

      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

  # API Gateway
  - type: web
    name: hotelpro-gateway
    runtime: docker
    plan: free
    rootDir: hotelpro-gateway
    dockerfilePath: ./Dockerfile
    autoDeploy: true

    envVars:
      - key: HOTELPRO_API_URL
        fromService:
          type: web
          name: hotelpro-api
          envVarKey: RENDER_EXTERNAL_URL